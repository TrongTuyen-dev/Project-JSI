<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body>

    
      <div class="bg-blur"></div>

    <div class="form-wrapper">
      <div id="message" style="color: yellow; margin-top: 10px; font-weight: bold;"></div>
      <div class="page-title">
      <h1>Celestial Meal✨</h1>
      <p>The Art of Fine Dining</p>
      <p>Chào mừng đã trở lại, vui lòng đăng nhập</p>
    </div>

      <h2>Đăng nhập</h2>
      <form id="login-form">
        <div id="message-box" class="message-box hidden"></div>
      
        <div class="form-control">
          <input id="email" type="text" required />
          <label>Email</label>
        </div>
        <div class="form-control">
          <input id="password" type="password" required />
          <label>Password</label>
        </div>
        <button type="submit">Đăng nhập</button>
        <button type="button" class="btn-google" id="btnGoogle">
          <svg class="google-icon" viewBox="0 0 18 18" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
            <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
            <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
            <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
            <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
          </svg>
          <span>Đăng nhập với Google</span>
        </button>
        <div class="form-help">
          <div class="remember-me">
            <input type="checkbox" id="remember-me" />
            <label for="remember-me">Hãy nhớ tôi</label>
          </div>
          <a href="#">Cần trợ giúp?</a>
        </div>
      </form>
      <p>Người mới với Celestial Meal? <a href="./register.html">Đăng kí ngay bây giờ</a></p>
    </div>

    <script type="module" src="script/login.js"></script>
  </body>
</html>
